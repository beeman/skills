interface:
  display_name: "Create PR"
  short_description: "Prepare a branch, commit, and GitHub PR"
  default_prompt: "Use $gh-pr-create to create a feature branch if needed, prepare the commit from the tracked staged diff only, never use `git add -f` or any other override for ignored paths unless the user explicitly instructs it, add any required changeset, treat an existing PR base as authoritative unless the user explicitly wants to retarget it, otherwise resolve the PR base the same way `gh pr create` does before classifying commit count, determine whether the PR will use `--fill` or explicit `--title` and `--body`, show the exact PR title and body that will be sent, treat multi-commit branches as an explicit stop-and-prompt case only when creating a new PR, use `gh pr create --fill` only for a single-commit new PR, and otherwise use explicit `--title` and `--body` values that describe the full branch diff against the resolved PR base and preserve any applicable issue trailer after confirmation."
