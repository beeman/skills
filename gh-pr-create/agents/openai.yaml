interface:
  default_prompt: "Use $gh-pr-create with required $gh-commit to prepare the branch and local commit, then resolve the PR base, preview the exact title and body, push the feature branch after approval, and create or update the GitHub PR. If $gh-commit is unavailable, ask the user which branch and commit to use before continuing."
  display_name: "Create PR"
  short_description: "Requires gh-commit to push and open a PR"
