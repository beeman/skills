interface:
  display_name: "Address PR Review Comments"
  short_description: "Triage and apply GitHub PR review comments"
  default_prompt: "Use $gh-pr-review-comments to triage GitHub PR review comments, apply accepted fixes on the current branch, run a self-review pass for contradictions introduced by those fixes, rerun verification if that self-review changes the diff, refresh stale commit or PR metadata when needed without dropping applicable issue trailers or required template sections, resolve threads, and request fresh review from the relevant human reviewers and configured bots."
